services:
  eatwise:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-eatwise/eatwise}:latest
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/context"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
